version: "3.8"

services:
  searchjet:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SEARCHJET_SERVER_HOST=0.0.0.0
      - SEARCHJET_SERVER_PORT=8080
      - SEARCHJET_MEILISEARCH_HOST=http://meilisearch:7700
      - SEARCHJET_MEILISEARCH_API_KEY=masterKey
      - SEARCHJET_MEILISEARCH_INDEX=uae-search
      - SEARCHJET_PDPL_RETENTION_DAYS=90
      - SEARCHJET_PDPL_ANALYTICS_DAYS=365
    depends_on:
      meilisearch:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - searchjet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=masterKey
      - MEILI_HTTP_PAYLOAD_SIZE_LIMIT=100MB
    networks:
      - searchjet
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - searchjet
    volumes:
      - redis_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    environment:
      - PROMETHEUS_RETENTION_TIME=15d
    networks:
      - searchjet
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - searchjet
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/searchjet.json
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  searchjet:
    driver: bridge

volumes:
  meilisearch_data:
  redis_data:
  prometheus_data:
  grafana_data:
